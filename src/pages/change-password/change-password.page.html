<ion-content [fullscreen]="true" class="change-password-page">

  <header class="top-bar">
    <button class="back-btn" (click)="goBack()">←</button>
    <h1 class="top-bar-title">{{ 'pwd.title' | translate }}</h1>
    <div class="spacer"></div>
    <div class="top-bar-line"></div>
  </header>

  <main class="change-password-canvas">

    <div class="lock-icon-section">
      <div class="lock-neon-border">
        <div class="lock-inner">
          <svg xmlns="http://www.w3.org/2000/svg" width="48" height="48" viewBox="0 0 24 24" fill="#97a9ff">
            <path d="M18 8h-1V6c0-2.76-2.24-5-5-5S7 3.24 7 6v2H6c-1.1 0-2 .9-2 2v10c0 1.1.9 2 2 2h12c1.1 0 2-.9 2-2V10c0-1.1-.9-2-2-2zm-6 9c-1.1 0-2-.9-2-2s.9-2 2-2 2 .9 2 2-.9 2-2 2zm3.1-9H8.9V6c0-1.71 1.39-3.1 3.1-3.1 1.71 0 3.1 1.39 3.1 3.1v2z"/>
          </svg>
        </div>
      </div>
      <p class="lock-label">{{ 'pwd.subtitle' | translate }}</p>
    </div>

    <div class="form-sections">

      <!-- Current Password -->
      <div class="glass-field glow-blue">
        <label class="field-label label-blue">{{ 'pwd.current' | translate }}</label>
        <div class="input-wrapper">
          <input
            [type]="showCurrent ? 'text' : 'password'"
            class="field-input"
            [(ngModel)]="currentPassword"
            placeholder="••••••••"
            autocomplete="current-password"
          />
          <button class="eye-btn" type="button" (click)="showCurrent = !showCurrent">
            {{ showCurrent ? '🙈' : '👁' }}
          </button>
        </div>
      </div>

      <!-- New Password -->
      <div class="glass-field glow-purple">
        <label class="field-label label-purple">{{ 'pwd.new' | translate }}</label>
        <div class="input-wrapper">
          <input
            [type]="showNew ? 'text' : 'password'"
            class="field-input"
            [(ngModel)]="newPassword"
            placeholder="••••••••"
            autocomplete="new-password"
          />
          <button class="eye-btn" type="button" (click)="showNew = !showNew">
            {{ showNew ? '🙈' : '👁' }}
          </button>
        </div>
        @if (newPassword && newPassword.length < 6) {
          <span class="field-hint hint-warn">{{ 'pwd.min_length' | translate }}</span>
        }
      </div>

      <!-- Confirm Password -->
      <div class="glass-field" [class.glow-purple]="!confirmMismatch" [class.glow-red]="confirmMismatch">
        <label class="field-label" [class.label-purple]="!confirmMismatch" [class.label-red]="confirmMismatch">
          {{ 'pwd.confirm' | translate }}
        </label>
        <div class="input-wrapper">
          <input
            [type]="showConfirm ? 'text' : 'password'"
            class="field-input"
            [(ngModel)]="confirmPassword"
            placeholder="••••••••"
            autocomplete="new-password"
          />
          <button class="eye-btn" type="button" (click)="showConfirm = !showConfirm">
            {{ showConfirm ? '🙈' : '👁' }}
          </button>
        </div>
        @if (confirmMismatch) {
          <span class="field-hint hint-warn">{{ 'pwd.mismatch' | translate }}</span>
        }
      </div>

    </div>

    <div class="save-section">
      <button class="btn-save" (click)="save()" [disabled]="saving || !canSave">
        @if (saving) {
          <ion-spinner name="crescent" style="width:18px;height:18px;color:#002283"></ion-spinner>
        } @else {
          {{ 'pwd.save' | translate }}
        }
      </button>
      @if (successMsg) {
        <p class="success-msg">{{ successMsg }}</p>
      }
      @if (errorMsg) {
        <p class="error-msg">{{ errorMsg }}</p>
      }
    </div>

  </main>

  <app-bottom-nav></app-bottom-nav>

</ion-content>
